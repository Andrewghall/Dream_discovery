name: Security Scan

on:
  push:
    branches:
      - main
      - pre-live
  pull_request:
    branches:
      - main
      - pre-live
  schedule:
    # Run weekly on Monday at 07:00 UTC (ISO 27001 A.8.8 vulnerability management)
    - cron: "0 7 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # ── CodeQL SAST Analysis ───────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Use security-extended queries for broader vulnerability coverage
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ── Dependency Audit (npm audit) ───────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit (production deps, high and critical only)
        # --omit=dev: only audit production deps (dev-only vulns cannot be exploited on Vercel)
        # xlsx (GHSA-4r6h-8v6p-xvw6, GHSA-5pgg-2g8v-p4x9) has no published fix from the maintainer.
        # Accepted risk: xlsx files are only processed by authenticated admin users (evidence upload).
        # All other high/critical transitive deps are pinned to patched versions via package.json overrides.
        run: |
          npm audit --omit=dev --audit-level=high --json > /tmp/audit.json 2>&1 || true
          python3 - <<'EOF'
          import json, sys
          with open('/tmp/audit.json') as f:
              data = json.load(f)
          ACCEPTED = {'xlsx'}  # no upstream fix available; admin-only usage
          vulns = data.get('vulnerabilities', {})
          blockers = {
              k: v.get('severity')
              for k, v in vulns.items()
              if v.get('severity') in ('high', 'critical') and k not in ACCEPTED
          }
          if blockers:
              print('FAIL - unacceptable vulnerabilities:', blockers)
              sys.exit(1)
          else:
              accepted = [k for k in vulns if k in ACCEPTED and vulns[k].get('severity') in ('high','critical')]
              print('PASS - no blocking vulnerabilities.')
              if accepted:
                  print('Accepted (no upstream fix):', accepted)
          EOF

  # ── Secret Scanning (detect secrets in committed code) ─────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (OSS secret scanner)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ── TypeScript Type Safety ─────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Run TypeScript check
        run: npx tsc --noEmit
